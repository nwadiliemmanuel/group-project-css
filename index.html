<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="index.css">
        <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  <title>Contact us</title>
</head>
<body>
  <main>
    <section class="hero">
      <h1>Plan Your Journey</h1>
      <div class="overlay"></div>
    </section>
    <!--Contact Section-->
    <section class="contact-container">
      
      <!--Form -->
      <div class="form-section">
        <h2>Book Your Trip</h2>
        
        <form>
          <input type="text" placeholder="Full name" required>
          <input type="email" placeholder="Email" required>
          <input type="tel" placeholder="Phone">
       <select>
          <option> Preferred Destination</option>
          <option>Paris,France</option>
          <option>Bali,Indonesia</option>
          <option>Tokyo,Japan</option>
        </select>
        
        <label>Travel Dates</label>
        <input type="date">
        <input type="date">
        
        
<input type="number" placeholder="Number of Travelers">

<select>
          <option>Budget Range</option>
          <option>$500 - $1000</option>
          <option>$1000 - $3000</option>
        </select>
        
        <textarea placeholder="Special Requests"></textarea>
        
        <button type="submit">Submit</button>

          <!-- INFO -->
          <div class="info-section">
            <h2>Contact Info</h2>
      <p><i class="fa-solid fa-map-pin"></i> Turing Tech, Enugu</p>
      <p><i class="fa-solid fa-phone"></i> +234 800 000 0000</p>
      <p>><i class="fa-regular fa-envelope"></i> info@travel.com</p>
      <p><i class="fa-regular fa-clock"></i> Mon - Fri: 9am - 5pm</p>
      
      <div class="socials">
        <a href="#">Facebook</a>
          <a href="#">Instagram</a>
        </div>

          </div>
          <!--Map-->
          <section>
            <iframe 
      src="https://www.google.com/maps?q=Enugu&output=embed"
      width="100%" 
      height="300" 
      style="border:0;" 
      loading="lazy">
    </iframe>
          </section>
        </form>
      </div>
      
    </section>
    
  </main>
</body>
</html>
